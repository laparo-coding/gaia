# Codacy Tool Selection Configuration
#
# This file controls which Codacy analyzer tools are applied to which paths
# by scripts/ci-cd/codacy-standard-check.sh. It is intentionally simple and
# shell-loadable (no YAML/JSON parser required) so the script can stay
# portable across bash 3.2 (macOS default) and bash 5.x.
#
# Format: KEY="value" or KEY=(item1 item2 ...)
# Lines starting with '#' are comments. Blank lines are ignored.

# Canonical JS/TS source roots that are eligible for ESLint analysis.
# The script matches each scanned path against these entries using a
# case-style glob (so "app" matches both the literal "app" and "app/...").
ESLINT_ROOTS=(
  app
  web
  client
  frontend
  ui
)

# Build / dependency directories that should never trigger ESLint even if
# they sit inside a JS/TS source root. Path components use the same glob
# semantics as `find -path`.
ESLINT_EXCLUDE_PATHS=(
  "*/node_modules/*"
  "*/.next/*"
  "*/dist/*"
  "*/build/*"
)

# File extensions that qualify a path as JS/TS source for ESLint selection.
ESLINT_EXTENSIONS=(
  js
  cjs
  mjs
  jsx
  ts
  tsx
  vue
  svelte
)

# Stable per-tool execution order. The Codacy CLI processes only the
# first --tool flag per invocation, so the script invokes the analyzer
# once per tool in this order. Reordering is safe; gaps are not.
TOOL_ORDER=(
  opengrep
  eslint
  trivy
)
