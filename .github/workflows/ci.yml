name: Gaia CI

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Swift format lint
        run: |
          swift format lint --configuration .swift-format --strict Package.swift
          swift format lint --configuration .swift-format --strict --recursive Sources Tests app/authentication

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  review-gates:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      # Intentionally non-enforcing placeholder until a repository-level review
      # policy command is implemented.
      - name: Enforce review gate placeholders
        run: |
          echo "::notice title=PLACEHOLDER_REVIEW_GATE::Review gate is currently informational only (non-enforcing)."
          echo "PLACEHOLDER_REVIEW_GATE"
